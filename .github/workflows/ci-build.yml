name: Manual Build and Release

on:
  # Allows manual triggering from the Actions tab
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'info'
        type: choice
        options:
          - info
          - warning
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Required for the release step
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zipalign apksigner

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download latest Brave
        run: |
          chmod +x ./download_latest_brave.sh
          BRAVE_VERSION=$(./download_latest_brave.sh)
          echo "BRAVE_VERSION=$BRAVE_VERSION" >> $GITHUB_ENV

      - name: Modify and Rebuild APK
        run: |
          # 1. Decompile
          chmod +x ./apktool
          ./apktool d Bravearm64Universal.apk -o Bravearm64Universal
          
          # 2. Update Package Name (Manifest + Smali paths)
          sed -i 's/>Brave</>Brave Edge</g' Bravearm64Universal/res/values/strings.xml
          sed -i 's/com.brave.browser/com.microsoft.emmx/g' Bravearm64Universal/AndroidManifest.xml
          echo "renameManifestPackage: com.microsoft.emmx" >> Bravearm64Universal/apktool.yml
          grep -rl "Lcom/brave/browser" Bravearm64Universal/ --include="*.smali" | xargs -r sed -i "s|Lcom/brave/browser|Lcom/microsoft/emmx|g"
          
          # 3. Replace Brave Icons
          chmod +x ./replace_res_icons.sh
          ./replace_res_icons.sh

          # 4. Rebuild
          ./apktool b Bravearm64Universal -o unsigned.apk

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Sign APK
        run: |
          zipalign -v 4 unsigned.apk aligned.apk
          apksigner sign \
            --ks release.jks --ks-pass pass:${{ secrets.KEY_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --out Bravearm64Universal-emmx-${{ env.BRAVE_VERSION }}.apk aligned.apk

      # - name: Upload Artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: Bravearm64Universal-emmx-${{ env.BRAVE_VERSION }}.apk
      #     path: final_app.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BRAVE_VERSION }}
          name: Release ${{ env.BRAVE_VERSION }}
          files: |
            Bravearm64Universal-emmx-${{ env.BRAVE_VERSION }}.apk


